const layers = [

      { name: "Typed Dataclasses", detail: "Frozen dataclasses (ScreenerConfig, ClusterConfig, IndicatorConfig) hydrated via dacite from validated dicts. Immutable by construction \u2014 safe for parallel execution", tech: "dacite.from_dict + @dataclass(frozen=True)" },
      { name: "YAML Config Loader", detail: "Single entry point: load_config(path) reads YAML, validates through Marshmallow, hydrates to typed config. Config is always valid downstream", tech: "PyYAML + dacite + marshmallow pipeline" },
    ],
  },
  {
    id: "pipeline",
    title: "Pipeline DAG Layer",
    subtitle: "Four-Stage Screening Pipeline with Local and Distributed Execution",
    color: COLORS.accent,
    glow: COLORS.accentGlow,
    components: [
      { name: "Ingest Stage", detail: "Partitions ticker list into chunks sized for parallel workers. Static S&P 500 list (~500 tickers) avoids runtime web scraping dependency", tech: "partition_tickers() + get_sp500_tickers()" },
      { name: "Fetch Stage", detail: "Pulls OHLCV price data per ticker via yfinance (free, no API key). Redis cache layer prevents re-fetching across indicator calculations. Cache key: ohlcv:{ticker}:{start}:{end}", tech: "yfinance + Redis cache with TTL" },

      { name: "Screen Stage", detail: "Applies configurable filter criteria (RSI thresholds, MACD crossovers, price vs SMA, Bollinger squeeze) then ranks passing tickers", tech: "FILTER_FUNCTIONS dispatch + rank_results()" },

    components: [
      { name: "Indicator Registry", detail: "Abstract base class with __init_subclass__ auto-registration. Any subclass setting a name attribute is discoverable via get_indicator(). No manual wiring required", tech: "INDICATOR_REGISTRY + __init_subclass__" },

      { name: "MACD (Moving Average Convergence Divergence)", detail: "Fast/slow EMA difference with signal line and histogram. Bullish/bearish crossover detection via histogram sign change", tech: "pandas ewm(span=N) difference" },

      { name: "SSH Bootstrap (Paramiko)", detail: "SSHes into each node, installs Ray and Python dependencies, starts head node or joins workers to cluster. Retry logic handles EC2 startup delay (5 attempts, 10s intervals)", tech: "paramiko SSHClient + exec_command" },

const enabledCapabilities = [

const dataFlows = [

      { text: "Ticker list partitioned into chunks based on chunk_size config", inScope: true },
      { text: "Each chunk fetched via yfinance, cached in Redis if available", inScope: true },

const decisions = [
  {
    title: "Ray Over Celery/Dask for Distribution",
    decision: "Ray remote tasks for parallel fetch and compute stages. DataFrames serialized to JSON (orient='split') for cross-node transfer rather than relying on Ray's object store for large DataFrames.",
    rationale: "Ray's task model maps directly to the fan-out/gather pattern needed for both fetch and compute stages. The autoscaler can query Ray's resource metrics to drive EC2 scaling decisions. Ray also handles worker failure and task retry natively.",
    tradeoff: "Ray requires Python 3.12 or below (no 3.13/3.14 support yet). JSON serialization is slower than Arrow/pickle but avoids version-mismatch deserialization errors across heterogeneous nodes. For 500 tickers this overhead is negligible.",
  },
  {
    title: "Static S&P 500 List Over Runtime Scraping",
    decision: "Ticker list is a static Python list in ingest.py (~500 tickers). No Wikipedia scraping, no external API dependency for the ticker universe.",
    rationale: "Removes a fragile runtime dependency. Wikipedia table structures change, rate limits apply, and the scrape adds latency to pipeline startup. S&P 500 composition changes quarterly \u2014 a static list updated periodically is sufficient for a screening POC.",
    tradeoff: "List goes stale as companies are added/removed from the index. Acceptable for POC scope. Production would pull from a data vendor or maintain a versioned ticker file.",
  },
  {
    title: "Indicator Registry via __init_subclass__",
    decision: "All indicators auto-register by inheriting from the Indicator base class and setting a name class attribute. No manual registration, no decorator, no import-time side effects beyond normal module loading.",
    rationale: "Adding a new indicator is: create a file, subclass Indicator, set name, implement compute(). Zero changes to existing code. The registry pattern keeps the indicator→pipeline coupling at exactly one point (the config's indicator name string).",
    tradeoff: "All indicator modules must be imported for registration to occur. The __init__.py handles this, but forgetting an import means the indicator silently doesn't exist. Mitigated by the config validator rejecting unknown indicator names at load time.",
  },
  {
    title: "Frozen Dataclasses for Pipeline Config",
    decision: "All config dataclasses are frozen=True. Config is immutable after hydration. No mutation allowed during pipeline execution.",
    rationale: "Distributed execution means config flows to multiple workers. Mutation would create divergent state. Frozen dataclasses make this impossible by construction and fail loudly (AttributeError) if code attempts mutation.",
    tradeoff: "Config transformations (e.g., overriding a field for a specific stage) require creating a new dataclass instance via dataclasses.replace(). Slightly more verbose than mutation but prevents a class of distributed bugs.",
  },
  {
    title: "Redis for Cache, State, and Results",
    decision: "Single Redis instance serves three roles: OHLCV data cache (avoid re-fetching), cluster node registry (track provisioned instances), and pipeline result sink (store final output).",
    rationale: "Redis is already required for Ray's internal coordination in cluster mode. Using it for application-level caching and state avoids introducing another dependency. All three use cases are key-value shaped and benefit from Redis's sub-millisecond reads.",
    tradeoff: "Single point of failure if Redis goes down mid-pipeline. Mitigated by graceful fallback: the pipeline runs without cache (re-fetches data), and results can be written directly to JSON. Cluster state loss is recoverable by re-querying EC2 tags.",
  },
  {
    title: "Marshmallow Validation Before Compute",
    decision: "All pipeline configuration is validated through Marshmallow schemas before any compute, network calls, or cluster provisioning begins. Invalid configs fail fast with structured error messages.",
    rationale: "Provisioning EC2 instances takes minutes and costs money. Fetching 500 tickers takes time. Validating that the config is well-formed before any of that happens prevents wasted resources on configs that would fail mid-pipeline.",
    tradeoff: "Schema must be kept in sync with the dataclass definitions. Marshmallow 4.x API changes (e.g., @validates accepting data_key kwarg) require attention during upgrades. Dual schema+dataclass is more code than a single Pydantic model, but keeps validation and domain models decoupled.",
  },
  {
    title: "Local and Distributed Execution from Same Config",
    decision: "ScreeningPipeline has two code paths (_run_local and _run_distributed) selected by a single flag. Same config file drives both modes. No separate config format for local vs cluster.",
    rationale: "Developers iterate locally with --local flag, then run the same config on a cluster. No config translation step, no environment-specific files. Reduces the gap between development and production execution.",
    tradeoff: "Cluster config fields (node_count, instance_type, placement_group) are present but ignored in local mode. Slightly noisy but preferable to maintaining two config schemas or conditional field requirements.",
  },
];

function ComponentCard({ comp, color, glow }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: hovered ? COLORS.surfaceLight : COLORS.surface,
        border: `1px solid ${hovered ? color : COLORS.border}`,
        borderRadius: 8,
        padding: "14px 16px",
        cursor: "default",
        transition: "all 0.2s ease",
        boxShadow: hovered ? `0 0 20px ${glow}` : "none",
        flex: "1 1 220px",
        minWidth: 220,
      }}
    >
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }} />
        <span style={{ fontFamily: "'JetBrains Mono', 'Fira Code', monospace", fontSize: 13, fontWeight: 600, color: COLORS.text }}>{comp.name}</span>
      </div>
      <p style={{ fontSize: 12, color: COLORS.textMuted, margin: "0 0 8px 0", lineHeight: 1.5 }}>{comp.detail}</p>
      <div style={{
        fontSize: 11,
        color: color,
        background: glow,
        padding: "4px 8px",
        borderRadius: 4,
        display: "inline-block",
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
      }}>
        {comp.tech}
      </div>
    </div>
  );
}

function LayerRow({ layer, isActive, onClick }) {
  return (
    <div
      onClick={onClick}
      style={{
        background: isActive ? COLORS.surfaceLight : COLORS.surface,
        border: `1px solid ${isActive ? layer.color : COLORS.border}`,
        borderRadius: 12,
        padding: "20px 24px",
        cursor: "pointer",
        transition: "all 0.25s ease",
        boxShadow: isActive ? `0 0 30px ${layer.glow}, inset 0 0 30px ${layer.glow}` : "none",
      }}
    >
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: isActive ? 16 : 0 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 12, height: 3, background: layer.color, borderRadius: 2, boxShadow: `0 0 8px ${layer.color}` }} />
            <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: COLORS.text, fontFamily: "'JetBrains Mono', 'Fira Code', monospace" }}>
              {layer.title}
            </h3>
          </div>
          <p style={{ margin: "4px 0 0 22px", fontSize: 12, color: COLORS.textMuted }}>{layer.subtitle}</p>
        </div>
        <span style={{ color: COLORS.textMuted, fontSize: 18, transform: isActive ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>{"\u25BE"}</span>
      </div>
      {isActive && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 8 }}>
          {layer.components.map((c, i) => (
            <ComponentCard key={i} comp={c} color={layer.color} glow={layer.glow} />
          ))}
        </div>
      )}
    </div>
  );
}

function FlowTypeIcon({ type }) {
  const icons = { sync: "\u2192", async: "\u21e2", error: "\u26a1", bridge: "\u21c4", query: "\u2315" };
  const colors = { sync: COLORS.accent, async: COLORS.purple, error: COLORS.red, bridge: COLORS.cyan, query: COLORS.green };
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      width: 28, height: 28, borderRadius: 6,
      background: `${colors[type]}22`, color: colors[type],
      fontWeight: 700, fontSize: 16, fontFamily: "monospace",
    }}>
      {icons[type]}
    </span>
  );
}

function FlowStep({ step, isLast }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
      <div style={{
        display: "flex", flexDirection: "column", alignItems: "center", minWidth: 18, paddingTop: 2,
      }}>
        <div style={{
          width: 8, height: 8, borderRadius: "50%",
          background: step.inScope ? COLORS.accent : COLORS.dimmed,
          boxShadow: step.inScope ? `0 0 6px ${COLORS.accent}` : "none",
          flexShrink: 0,
        }} />
        {!isLast && <div style={{ width: 1, height: 20, background: COLORS.border, marginTop: 4 }} />}
      </div>
      <span style={{
        fontSize: 12,
        lineHeight: 1.5,
        color: step.inScope ? COLORS.text : COLORS.dimmed,
        fontStyle: step.inScope ? "normal" : "italic",
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
      }}>
        {step.text}
      </span>
    </div>
  );
}

function ScreenerBlueprint() {
  const [activeLayer, setActiveLayer] = useState("config");
  const [activeTab, setActiveTab] = useState("architecture");
  const [capsExpanded, setCapsExpanded] = useState(false);

  return (
    <div style={{
      background: COLORS.bg,
      minHeight: "100vh",
      color: COLORS.text,
      fontFamily: "'Inter', -apple-system, sans-serif",
      padding: "32px 24px",
    }}>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ marginBottom: 32, borderBottom: `1px solid ${COLORS.border}`, paddingBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
            <div style={{ width: 4, height: 32, background: `linear-gradient(180deg, ${COLORS.accent}, ${COLORS.purple})`, borderRadius: 2 }} />
            <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "-0.02em" }}>
              Stock Screener Pipeline Blueprint
            </h1>
          </div>
          <p style={{ margin: "0 0 0 16px", color: COLORS.textMuted, fontSize: 13, lineHeight: 1.6 }}>
            Distributed stock screening pipeline &mdash; multi-stage DAG across an EC2 cluster via Ray, screening ~500 S&P 500 tickers through configurable technical indicator analysis
          </p>
          <div style={{ display: "flex", gap: 12, marginTop: 12, marginLeft: 16, flexWrap: "wrap" }}>
            {["Ray", "Boto3", "Paramiko", "Redis", "Marshmallow", "dacite", "yfinance", "pandas"].map(tag => (
              <span key={tag} style={{
                fontSize: 11, color: COLORS.textMuted, background: COLORS.surfaceLight,
                padding: "3px 10px", borderRadius: 4, border: `1px solid ${COLORS.border}`,
                fontFamily: "'JetBrains Mono', monospace",
              }}>{tag}</span>
            ))}
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 24, background: COLORS.surface, borderRadius: 8, padding: 4, border: `1px solid ${COLORS.border}` }}>
          {[
            { id: "architecture", label: "Layered Architecture" },
            { id: "dataflows", label: "Pipeline Flow Patterns" },
            { id: "decisions", label: "Key Design Decisions" },
          ].map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              style={{
                flex: 1,
                padding: "10px 16px",
                background: activeTab === tab.id ? COLORS.surfaceLight : "transparent",
                border: activeTab === tab.id ? `1px solid ${COLORS.borderActive}` : "1px solid transparent",
                borderRadius: 6,
                color: activeTab === tab.id ? COLORS.text : COLORS.textMuted,
                fontSize: 13,
                fontWeight: 600,
                cursor: "pointer",
                transition: "all 0.2s",
                fontFamily: "'JetBrains Mono', monospace",
              }}
            >
              {tab.label}
            </button>
          ))}
        </div>

        {/* Architecture Tab */}
        {activeTab === "architecture" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <p style={{ fontSize: 12, color: COLORS.textMuted, margin: "0 0 8px 0" }}>
              Click each layer to expand components. Config validates before compute. Pipeline stages fan out via Ray. Infrastructure provisions and scales the cluster.
            </p>
            {layers.map((layer) => (
              <div key={layer.id}>
                <LayerRow
                  layer={layer}
                  isActive={activeLayer === layer.id}
                  onClick={() => setActiveLayer(activeLayer === layer.id ? null : layer.id)}
                />
                {layer.id !== "infra" && (
                  <div style={{ display: "flex", justifyContent: "center", padding: "4px 0" }}>
                    <div style={{ width: 1, height: 16, background: COLORS.border }} />
                  </div>
                )}
              </div>
            ))}

            {/* Enabled Capabilities */}
            <div style={{ display: "flex", justifyContent: "center", padding: "4px 0" }}>
              <div style={{ width: 1, height: 16, background: COLORS.border, opacity: 0.4 }} />
            </div>
            <div
              onClick={() => setCapsExpanded(!capsExpanded)}
              style={{
                background: capsExpanded ? COLORS.surfaceLight : COLORS.surface,
                border: `1px dashed ${capsExpanded ? COLORS.dimmed : COLORS.border}`,
                borderRadius: 12,
                padding: "20px 24px",
                cursor: "pointer",
                transition: "all 0.25s ease",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: capsExpanded ? 16 : 0 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 12, height: 3, background: COLORS.dimmed, borderRadius: 2 }} />
                    <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: COLORS.dimmed, fontFamily: "'JetBrains Mono', 'Fira Code', monospace" }}>
                      Enabled Capabilities
                    </h3>
                    <span style={{
                      fontSize: 10, color: COLORS.dimmed, fontStyle: "italic",
                      background: `${COLORS.dimmed}18`, padding: "2px 8px", borderRadius: 4,
                      border: `1px solid ${COLORS.dimmed}30`,
                    }}>what this architecture enables</span>
                  </div>
                  <p style={{ margin: "4px 0 0 22px", fontSize: 12, color: COLORS.dimmed }}>
                    Scaling, extensibility, and development workflow properties that emerge from the design
                  </p>
                </div>
                <span style={{ color: COLORS.dimmed, fontSize: 18, transform: capsExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>{"\u25BE"}</span>
              </div>
              {capsExpanded && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
                  {enabledCapabilities.map((cap, i) => (
                    <div key={i} style={{
                      background: COLORS.bg,
                      border: `1px dashed ${COLORS.border}`,
                      borderRadius: 8,
                      padding: "14px 16px",
                      flex: "1 1 220px",
                      minWidth: 220,
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.dimmed }} />
                        <span style={{ fontFamily: "'JetBrains Mono', 'Fira Code', monospace", fontSize: 13, fontWeight: 600, color: COLORS.dimmed }}>{cap.name}</span>
                      </div>
                      <p style={{ fontSize: 12, color: COLORS.dimmed, margin: 0, lineHeight: 1.5 }}>{cap.detail}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* Data Flows Tab */}
        {activeTab === "dataflows" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <p style={{ fontSize: 12, color: COLORS.textMuted, margin: "0 0 4px 0" }}>
              How data moves through the pipeline &mdash; each pattern shows where the screener is active and where external systems take over.
            </p>
            <div style={{ display: "flex", gap: 16, fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>
              <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.accent, boxShadow: `0 0 6px ${COLORS.accent}`, display: "inline-block" }} />
                Within pipeline scope
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.dimmed, display: "inline-block" }} />
                External (user action or downstream)
              </span>
            </div>
            {dataFlows.map((flow, i) => (
              <div key={i} style={{
                background: COLORS.surface,
                border: `1px solid ${COLORS.border}`,
                borderRadius: 10,
                padding: "18px 20px",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
                  <FlowTypeIcon type={flow.type} />
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{flow.label}</div>
                    <div style={{ fontSize: 12, color: COLORS.textMuted }}>
                      {flow.from} <span style={{ color: COLORS.accent }}>{"\u2192"}</span> {flow.to}
                    </div>
                  </div>
                </div>
                <div style={{ marginLeft: 4, marginBottom: 12 }}>
                  {flow.steps.map((step, j) => (
                    <FlowStep key={j} step={step} isLast={j === flow.steps.length - 1} />
                  ))}
                </div>
                <div style={{
                  background: COLORS.surfaceLight,
                  borderRadius: 6,
                  padding: "10px 14px",
                  fontSize: 12,
                  color: COLORS.textMuted,
                  lineHeight: 1.6,
                  borderLeft: `3px solid ${COLORS.border}`,
                }}>
                  {flow.note}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Design Decisions Tab */}
        {activeTab === "decisions" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <p style={{ fontSize: 12, color: COLORS.textMuted, margin: 0 }}>
              Architectural decisions with rationale and explicit tradeoffs &mdash; the "why" behind the pipeline design.
            </p>
            {decisions.map((d, i) => (
              <div key={i} style={{
                background: COLORS.surface,
                border: `1px solid ${COLORS.border}`,
                borderRadius: 10,
                padding: "20px",
              }}>
                <h4 style={{ margin: "0 0 12px 0", fontSize: 14, fontWeight: 700, color: COLORS.text, fontFamily: "'JetBrains Mono', monospace" }}>
                  {d.title}
                </h4>
                {[
                  { label: "Decision", value: d.decision, color: COLORS.green },
                  { label: "Rationale", value: d.rationale, color: COLORS.accent },
                  { label: "Tradeoff", value: d.tradeoff, color: COLORS.orange },
                ].map((section, j) => (
                  <div key={j} style={{ marginBottom: j < 2 ? 10 : 0 }}>
                    <div style={{
                      fontSize: 11,
                      fontWeight: 600,
                      color: section.color,
                      textTransform: "uppercase",
                      letterSpacing: "0.05em",
                      marginBottom: 4,
                      fontFamily: "'JetBrains Mono', monospace",
                    }}>
                      {section.label}
                    </div>
                    <p style={{ margin: 0, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6 }}>
                      {section.value}
                    </p>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* Footer */}
        <div style={{ marginTop: 32, paddingTop: 16, borderTop: `1px solid ${COLORS.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>
            Internal Engineering Reference &middot; v0.1.0
          </span>
          <span style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>
            Stock Screener POC &middot; March 2026
          </span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ScreenerBlueprint />);
</script>
</body>
</html>
